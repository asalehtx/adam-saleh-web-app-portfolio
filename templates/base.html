<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Saleh | Full Stack Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* 2. Global Reset (Overrides browser defaults) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 3. Global Dark Mode & Font Settings */x
        body, html {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Jost', sans-serif;
            width: 100%;
            height: 100%;
        }

        h1, h2, h3, h4, h5, h6, .logo {
            font-family: 'Poppins', sans-serif;
        }

        /* 4. Global Fixed Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(18, 18, 18, 0.85); /* Frost effect background */
            backdrop-filter: blur(10px);        /* Frost effect blur */
            z-index: 2000; /* Ensures it always stays on top of content */
        }

        .logo { 
            font-size: 24px; 
            font-weight: 700; 
            color: #ffffff; 
            text-decoration: none;
        }
        
        .logo span {
            color: #007bff; /* Blue accent dot */
        }

        .nav-links { 
            list-style: none; 
            display: flex; 
            gap: 30px; 
        }

        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            transition: color 0.3s; 
        }

        .nav-links a:hover { 
            color: #007bff; 
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo">Adam<span>.</span></a>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}#hero">Home</a></li>
            <li><a href="{{ url_for('home') }}#about">About</a></li>
            <li><a href="{{ url_for('home') }}#projects">Projects</a></li>
            <li><a href="{{ url_for('home') }}#contact">Contact</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
